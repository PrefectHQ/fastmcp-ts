name: MCP Conformance Nightly (main)

# Runs the MCP conformance suite UNPINNED, against modelcontextprotocol/conformance's
# `main` branch, so scenarios that land ahead of a tagged release (e.g. new
# 2026-07-28-era scenarios) surface pre-GA. The PR-blocking jobs in ci.yml stay
# pinned to @modelcontextprotocol/conformance@0.1.16 for reproducibility; this
# workflow is intentionally the unpinned counterpart and is not required for PRs
# to merge — only its own run status reflects here.
on:
  schedule:
    # 06:17 UTC daily — an off-peak hour, minute offset from :00 to avoid the
    # top-of-hour GitHub Actions scheduler crunch.
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  conformance-server-main:
    name: MCP conformance vs main (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Boot server fixture
        run: |
          PORT=39750 npx tsx tests/conformance/everything-server.ts > fixture.log 2>&1 &
          echo $! > fixture.pid
          for i in $(seq 1 30); do
            if grep -q "listening on" fixture.log; then
              echo "fixture ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::fixture did not become ready within 30s"
          cat fixture.log
          exit 1

      # `npx --yes github:<owner>/<repo>` resolves and npm-installs the repo at
      # its default branch (main); npm runs the package's own `prepare` script
      # (`npm run build`) for git-installed deps, so every invocation always
      # executes against current main HEAD with no manual checkout/build step.
      # Verified locally (task-8 report): `npx --yes
      # github:modelcontextprotocol/conformance --version` reported
      # 0.2.0-alpha.9 (pre-release/unpublished), distinct from the 0.1.16 pin
      # used in ci.yml, and a full server run against the fixture surfaced
      # 2026-07-28-era scenarios (server-stateless, tasks-*,
      # input-required-result-*, etc.) that don't exist in 0.1.16.
      #
      # `--suite all` runs every scenario (active + pending + draft) in one
      # pass — on main, "active" now excludes both pending AND draft, so `all`
      # is required to actually catch newly-landed scenarios.
      #
      # Baseline: conformance-baseline-main.yml (a SEPARATE file from the
      # pinned conformance-baseline.yml ci.yml uses) — main is unpinned and
      # moves, so its expected-failure set is tracked independently. Task 14
      # regenerated it end to end (2026-07-22): 24 server scenarios remain,
      # all named/grouped by cause (deferred tasks extension, SEP-2322
      # draft-scenario fixture gaps, two genuine SHOULD-level gaps) — see the
      # file's own header and per-entry comments for the full accounting.
      - name: Run conformance (server, suite=all)
        run: |
          npx --yes github:modelcontextprotocol/conformance server \
            --url http://127.0.0.1:39750/mcp \
            --suite all \
            --expected-failures conformance-baseline-main.yml

      - name: Stop server fixture
        if: always()
        run: kill "$(cat fixture.pid)" 2>/dev/null || true

  conformance-client-main:
    name: MCP conformance vs main (client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Scenario set is DERIVED each run from `list --client`, not hardcoded —
      # that's the whole point of tracking main. Every scenario `list --client`
      # names is run, `auth/*` included: the everything-client fixture now
      # drives OAuth for real (Task 13 — it configures an authorization-code
      # + PKCE provider, DCR/pre-registration, from the scenario context), so
      # the auth filter that used to sit here (dropping every `auth/`-prefixed
      # scenario, back when the fixture registered no OAuth provider at all)
      # is gone. Verified locally (Task 14, 2026-07-22) this yields 43
      # scenarios today: the same 10 non-auth ones the filter used to leave
      # (initialize, tools_call, elicitation-sep1034-client-defaults,
      # sse-retry, request-metadata, sep-2322-client-request-state,
      # http-standard-headers, http-custom-headers, http-invalid-tool-headers,
      # json-schema-ref-no-deref) plus 33 `auth/*` scenarios — the 14 core
      # `[2025-11-25]`-era ones tests/conformance/run-client.mjs also runs
      # pinned, plus main-only 2026-07-28/extension additions (SEP-2352 AS
      # migration, `iss`/PRM checks, DPoP, client-credentials, JWT-bearer,
      # enterprise-managed-auth). Whatever fails is named in
      # conformance-baseline-main.yml with a one-line reason.
      #
      # `list --client`'s own exit code and pipefail (the default shell here
      # is `bash -eo pipefail`) fail this step loudly if the listing/parse
      # breaks — verified locally by pointing the same pipeline at a
      # nonexistent package: the script died immediately with no output,
      # before reaching the scenario loop. Only after a scenario list is
      # confirmed non-empty does the script relax to `set +e`, so all derived
      # scenarios still run even if one fails — matching run-client.mjs's
      # accumulate-then-exit behavior — with the baseline still applied.
      #
      # The loop stays SEQUENTIAL (one `--scenario` invocation at a time, not
      # `--suite`/parallel) for the same reason run-client.mjs enumerates
      # auth scenarios by name: the everything-client's OAuth callback server
      # binds one fixed loopback port (baked into the DCR-registered
      # redirect_uri), which concurrent auth scenarios would race for. Before
      # this task the loop was sequential incidentally (order never mattered
      # for the non-auth-only set); now it's load-bearing.
      - name: Run conformance (client, derived scenarios incl. auth)
        run: |
          scenarios=$(npx --yes github:modelcontextprotocol/conformance list --client \
            | grep -oE '^ *- [^ ]+' \
            | sed -E 's/^ *- //')
          if [ -z "$scenarios" ]; then
            echo "::error::failed to derive any client scenarios from 'list --client'"
            exit 1
          fi
          echo "Derived client scenarios:"
          echo "$scenarios"

          set +e
          any_failed=0
          for scenario in $scenarios; do
            echo "=== $scenario ==="
            npx --yes github:modelcontextprotocol/conformance client \
              --command "npx tsx tests/conformance/everything-client.ts" \
              --scenario "$scenario" \
              --expected-failures conformance-baseline-main.yml
            if [ $? -ne 0 ]; then any_failed=1; fi
          done
          exit $any_failed
